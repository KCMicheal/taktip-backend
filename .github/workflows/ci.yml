name: CI

on:
  push:
    branches: [main, staging, 'sprint-*/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy Staging
    runs-on: self-hosted
    labels: [staging]
    if: github.ref == 'refs/heads/staging'
    environment: staging
    
    steps:
      - name: Deploy to staging
        run: |
          set -e
          cd /home/stg-api/public_html
          git fetch origin staging
          git checkout staging
          git pull origin staging
          rm -rf node_modules pnpm-lock.yaml package-lock.json
          ~/.local/bin/pnpm install
          ~/.local/bin/pnpm run build
          pm2 restart taktip-staging || (pm2 start ecosystem.config.js --name taktip-staging && pm2 save)

  deploy-main:
    name: Deploy Production
    runs-on: self-hosted
    labels: [production]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Deploy to production
        run: |
          set -e
          cd /home/api/public_html
          git fetch origin main
          git checkout main
          git pull origin main
          rm -rf node_modules pnpm-lock.yaml package-lock.json
          ~/.local/bin/pnpm install
          ~/.local/bin/pnpm run build
          pm2 restart taktip-prod || (pm2 start ecosystem.config.js --name taktip-prod && pm2 save)
